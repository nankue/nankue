<body>
       <form class="box" id="validationForm">     
        <h3>身份证批量单要素验证+补齐</h3> 
        <textarea placeholder="一行一个身份证号 可批量秒补后二、验证号码" id="idCards" name="idCards" required></textarea><br>
        <p style="margin:3px"></p>
        <button type="submit">验证</button>
     </form><p><div class="result" id="result"></div>
    <script>
    document.getElementById('validationForm').addEventListener('submit', function(event) {
    event.preventDefault();

    const idCards = document.getElementById('idCards').value.split('\n');
    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = ''; 
    idCards.forEach((idCard, index) => {
        idCard = idCard.trim();
        if (!idCard) return;
        const validationResult = validateIDCard(idCard);
        const resultItem = document.createElement('div');
        resultItem.className = validationResult.isValid ? 'valid' : 'invalid';
        let resultText = `<result>
                          号码：${idCard}<br>                       
                          性别: ${validationResult.gender} • 年龄: ${validationResult.age}<br></result>
                          核验结果：<verify>${validationResult.isValid ? '此号码生效中' : '身份证号不存在'}</verify>                         
                          `;

        if (!validationResult.isValid && validationResult.correctedIDCard) {
            resultText += `<br><buqi>补齐号码：${validationResult.correctedIDCard}</buqi>`;
        }
        resultItem.innerHTML = resultText;
        resultDiv.appendChild(resultItem);
    });
});
function validateIDCard(idCard) {
    if (idCard.length !== 18) {
        return {
            isValid: false,
            gender: ' null',
            age: 'null',
            correctedIDCard: null
        };
    }
    const birthDate = idCard.substring(6, 14);
    const year = parseInt(birthDate.substring(0, 4));
    const month = parseInt(birthDate.substring(4, 6)) - 1;
    const day = parseInt(birthDate.substring(6, 8));
    const birthDateObj = new Date(year, month, day);
    if (isNaN(birthDateObj.getTime())) {
        return {
            isValid: false,
            gender: 'null',
            age: 'null',
            correctedIDCard: null
        };
    }
    const today = new Date();
    let age = today.getFullYear() - birthDateObj.getFullYear();
    if (today.getMonth() < birthDateObj.getMonth() || 
        (today.getMonth() === birthDateObj.getMonth() && today.getDate() < birthDateObj.getDate())) {
        age--;
    }
    const genderDigit = parseInt(idCard.charAt(16));
    const gender = genderDigit % 2 === 1 ? '男' : '女';
    const weights = [7, 9, 10, 5, 8, 4, 2, 1, 6, 3, 7, 9, 10, 5, 8, 4, 2];
    const checkCodes = ['1', '0', 'X', '9', '8', '7', '6', '5', '4', '3', '2'];
    let sum = 0;
    for (let i = 0; i < 17; i++) {
        sum += parseInt(idCard.charAt(i)) * weights[i];
    }
    const checkCode = checkCodes[sum % 11];
    const isValid = idCard.charAt(17) === checkCode;
    let correctedIDCard = null;
    if (!isValid) {
        correctedIDCard = idCard.substring(0, 17) + checkCode;
    }

    return {
        isValid,
        gender,
        age,
        correctedIDCard
    };
}

<head>

    <style>

        #result-wrapper { display: none; margin-top: 5px; }
        .fade-in-up {
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }

<body>

    <div class="box">
    <h3 style="margin-bottom:5px">快手账号深度解析</h3>
             <div style="font-weight:500;font-size:10px;opacity:0.5;margin-bottom:20px;">
             此工具可以强制解析快手主页分享链接<br/>
             可以强制查询到原始ID、作品列表、等信息<br/>
             如果查询对象没有更换过原始快手号<br/>
             可能会匹配到分享者的自定义快手号<br/>
             测试分享链接：https://v.kuaishou.com/Jjc5ZjmV
           </div>       
        <textarea style="height:70px;" type="text" id="urlInput" placeholder="请粘贴快手主页分享链接"></textarea>
        <button onclick="fetchData()">点击查询</button>
        <p style="margin:5px"></p>
        <span id="loading" style="font-weight:900;display:none; margin-left:10px; font-size:12px; color: rgba(255,255,255,0.5);">正在抓取 稍后...</span>
    </div>

    <div id="result-wrapper">
        <div class="info-card fade-in-up">
            <div class="data-row"><span class="data-label">用户名:</span><span id="res_name"></span></div>
            <div class="data-row"><span class="data-label">原始ID:</span><span id="res_uid"></span></div>
            <div class="data-row"><span class="data-label">快手号:</span><span id="res_kid"></span></div>
            
            <div style="margin-top:5px;">
                <span class="data-label">用户简介:</span>
                <div id="res_bio" class="text-block"></div>
            </div>
        </div>

        <div class="info-card fade-in-up" style="animation-delay: 0.2s;">
            <div class="data-label">近期作品标题:</div>
            <div id="res_captions" class="text-block"></div>
        </div>

        <div class="info-card fade-in-up" style="animation-delay: 0.4s;">
            <div class="data-label">页面实时预览:</div>
            <iframe id="previewFrame" src="" width="100%" height="500" style="margin-top:10px;"></iframe>
        </div>
    </div>

    <script>
        async function fetchData() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return;
            document.getElementById('loading').style.display = 'inline';
            const wrapper = document.getElementById('result-wrapper');
            wrapper.style.display = 'none';

            try {
                const response = await fetch(url);
                const html = await response.text();

                // 1. 提取用户名
                const nameMatch = html.match(/<span[^>]*data-v-6f89c582[^>]*>(.*?)<\/span>/);
                document.getElementById('res_name').innerText = nameMatch ? nameMatch[1] : '未知';

                // 2. 频率统计 ID
                document.getElementById('res_uid').innerText = getMost(html, /"(?:user_id|userId)"\s*:\s*"?(\d+)"?/g);
                document.getElementById('res_kid').innerText = getMost(html, /"kwaiId"\s*:\s*"([^"]+)"/g);

                // 3. 简介
                const bioMatches = [...html.matchAll(/"user_text"\s*:\s*"([^"]+?)"/g)];
                const bio = bioMatches.length > 0 ? bioMatches.map(m => m[1]).reduce((a, b) => a.length > b.length ? a : b) : "暂无简介";
                document.getElementById('res_bio').innerText = decode(bio);

                // 4. 作品标题
                const captions = [...html.matchAll(/"caption"\s*:\s*"([^"]+?)"/g)];
                const capContainer = document.getElementById('res_captions');
                capContainer.innerHTML = '';
                captions.forEach((m, i) => {
                    const txt = decode(m[1]);
                    if(txt.trim()){
                        const div = document.createElement('div');
                        div.className = 'caption-item';
                        div.innerText = `${i + 1}. ${txt}`;
                        capContainer.appendChild(div);
                    }
                });

                document.getElementById('previewFrame').src = url;

                wrapper.style.display = 'block';

            } catch (err) {
                yeju.alert("❌ 抓取失败 接口出现了问题…");
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function getMost(str, reg) {
            const counts = {};
            let m, maxV = "", maxC = 0;
            while ((m = reg.exec(str)) !== null) {
                const v = m[1];
                counts[v] = (counts[v] || 0) + 1;
                if (counts[v] > maxC) { maxC = counts[v]; maxV = v; }
            }
            return maxV;
        }

        function decode(str) {
            return str.replace(/\\u([0-9a-fA-F]{4})/g, (_, g) => String.fromCharCode(parseInt(g, 16)))
                      .replace(/\\n/g, '\n').replace(/\\"/g, '"');
        }
  </script>

    tgIcon.style.cssText = `width: 28px;height: 28px;border-radius: 50%;object-fit: cover;`;const textWrap = document.createElement('div');textWrap.style.lineHeight = "1.6";
waterMark.appendChild(tgIcon);waterMark.appendChild(textWrap);document.body.appendChild(waterMark);function parseKamiTime(str) {const y = str.slice(0, 4);const m = str.slice(4, 6);const d = str.slice(6, 8);const h = str.slice(8, 10);const mi = str.slice(10, 12);const s = str.slice(12, 14);return new Date(`${y}-${m}-${d} ${h}:${mi}:${s}`).getTime();}const endTime = parseKamiTime(kamiStr);let expireFlag = false;function showExpireModal() {if (document.getElementById('expire-modal')) return;const mask = document.createElement('div');mask.id = 'expire-modal';mask.style.cssText = `position: fixed;top: 0;left: 0;width: 100%;height: 100%;background: rgba(0,0,0,0.6);display: flex;justify-content: center;align-items: center;z-index: 99999999;opacity: 0;transition: opacity 0.3s ease;`;const modalBox = document.createElement('div');modalBox.style.cssText = `background: #fff;padding: 20px 30px;border-radius: 25px;font-size: 13px;color: #333;box-shadow: 0 4px 20px rgba(0,0,0,0.2);transform: scale(0.9);transition: transform 0.3s ease;`;modalBox.innerHTML = `

         <center><img style="border-radius:10px;background-color:#fff;width:40%"
